<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Generate SHA-256 Password Hash</title>
  <style>body{font-family:Arial; padding:20px} label,input,button{display:block;margin:8px 0} pre{background:#f6f6f6;padding:10px}</style>
</head>
<body>
  <h3>Generate SHA-256 Hex Hash</h3>
  <label>Password</label>
  <input id="pw" type="password" placeholder="type password here" style="width:100%;max-width:420px">
  <button id="gen">Generate Hash</button>
  <p>Copy the resulting hex string into `window.SHREE_CONFIG.ADMIN_PASSWORD_HASH` in `src/assets/js/secrets.js`.</p>
  <pre id="out">No output yet</pre>

  <script>
    async function sha256Hex(str){
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    document.getElementById('gen').addEventListener('click', async ()=>{
      const pw = document.getElementById('pw').value || '';
      if(!pw) return alert('Enter a password');
      const h = await sha256Hex(pw);
      document.getElementById('out').textContent = h;
    });
  </script>
</body>
</html>
