<!DOCTYPE html>
<html>
<head>
  <title>Logo Color Extractor</title>
</head>
<body>
  <div id="results" style="font-size: 24px; font-family: sans-serif; margin: 20px;">
    Analyzing logo...
  </div>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="logo" src="../assets/images/logos/shree.png" style="max-width: 200px; display: block; margin: 20px;" />

  <script>
    window.onload = function() {
      const img = document.getElementById('logo');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      
      // We want to find the dominant color that is neither white, black, nor fully transparent,
      // and has a maroon/reddish tone (R > G and R > B).
      const colorCounts = {};
      let maxCount = 0;
      let dominantColor = '';
      
      for (let i = 0; i < imgData.length; i += 4) {
        const r = imgData[i];
        const g = imgData[i+1];
        const b = imgData[i+2];
        const a = imgData[i+3];
        
        // Skip transparent, white, black, or gray-ish pixels
        if (a < 200) continue;
        if (r > 240 && g > 240 && b > 240) continue;
        if (r < 15 && g < 15 && b < 15) continue;
        
        // Check if color is reddish/maroon (red is dominant, green/blue are lower)
        if (r > g * 1.2 && r > b * 1.2) {
          // Round to nearest 5 or 10 to group similar shades
          const rr = Math.round(r / 5) * 5;
          const gg = Math.round(g / 5) * 5;
          const bb = Math.round(b / 5) * 5;
          const rgb = `${rr},${gg},${bb}`;
          
          colorCounts[rgb] = (colorCounts[rgb] || 0) + 1;
          if (colorCounts[rgb] > maxCount) {
            maxCount = colorCounts[rgb];
            dominantColor = rgb;
          }
        }
      }
      
      const resultsDiv = document.getElementById('results');
      if (dominantColor) {
        const [r, g, b] = dominantColor.split(',').map(Number);
        const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        resultsDiv.innerHTML = `
          <h2>Extraction Successful!</h2>
          <p>Dominant Maroon RGB: <strong>${r}, ${g}, ${b}</strong></p>
          <p>Dominant Maroon HEX: <strong>${hex}</strong></p>
          <div style="width: 100px; height: 100px; background-color: ${hex}; border: 1px solid #000;"></div>
        `;
      } else {
        resultsDiv.innerHTML = `<h2>Could not extract dominant maroon.</h2>`;
      }
    };
  </script>
</body>
</html>
